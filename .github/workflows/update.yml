name: Update matches

on:
  schedule:
    - cron: '30 18 * * *'   # 19:30 UK
    - cron: '30 19 * * *'   # 20:30 UK
    - cron: '30 21 * * *'   # 22:30 UK
    - cron: '30 22 * * *'   # 23:30 UK
    - cron: '30 0 * * *'    # 01:30 UK
    - cron: '30 1 * * *'    # 02:30 UK
    - cron: '30 2 * * *'    # 03:30 UK
    - cron: '30 3 * * *'    # 04:30 UK
    - cron: '30 5 * * *'    # 06:30 UK
    - cron: '30 6 * * *'    # 07:30 UK
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Fetch matches
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_matches.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add matches_bbc.json matches_itv.json matches_fox.json matches_tsn.json
          git diff --staged --quiet || git commit -m "Update matches"
          git push
