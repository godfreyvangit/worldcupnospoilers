<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup No Spoilers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }

        header {
            padding: 2rem 1.5rem 1rem;
            border-bottom: 1px solid #222;
        }

        header h1 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
        }

        header p {
            font-size: 11px;
            color: #555;
            margin-top: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .date-section { margin-bottom: 3rem; }

        .date-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #1a1a1a;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .match-card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .match-card:hover {
            border-color: #333;
            background: #161616;
        }

        .flags {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 1.5rem 1rem;
            font-size: 44px;
            background: #0f0f0f;
        }

        .match-info {
            padding: 10px 12px;
            border-top: 1px solid #1a1a1a;
            text-align: center;
        }

        .match-teams {
            font-size: 12px;
            color: #888;
            line-height: 1.5;
        }

        .channel-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 6px;
        }

        .channel-itv { background: #1a0a2e; color: #9b59b6; }
        .channel-bbc { background: #0a1a2e; color: #3498db; }

        .empty-state {
            color: #333;
            font-size: 13px;
            text-align: center;
            padding: 4rem;
            letter-spacing: 1px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open { display: flex; }

        .modal-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 10px;
            width: 100%;
            max-width: 860px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e1e1e;
        }

        .modal-close {
            background: none;
            border: none;
            color: #555;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }

        .modal-close:hover { color: #fff; }

        .video-wrap {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0 0 10px 10px;
        }

        .title-cover {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #000;
            pointer-events: none;
            z-index: 9999;
        }

        @media (max-width: 600px) {
            .matches-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .flags { font-size: 36px; padding: 1.2rem 0.8rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>No Spoilers World Cup</h1>
    <p>World Cup 2026 &mdash; Spoiler-free highlights</p>
</header>

<main id="main">
    <div class="empty-state">Loading matches...</div>
</main>

<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="modal-header">
            <button class="modal-close" onclick="closeModal()">&#x2715;</button>
        </div>
        <div class="video-wrap">
            <div class="title-cover" id="title-cover"></div>
            <iframe id="modal-iframe" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const FLAGS = {
        "england": "🏴󠁧󠁢󠁥󠁮󠁧󠁿",
        "scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
        "france": "🇫🇷",
        "germany": "🇩🇪",
        "spain": "🇪🇸",
        "portugal": "🇵🇹",
        "netherlands": "🇳🇱",
        "belgium": "🇧🇪",
        "croatia": "🇭🇷",
        "austria": "🇦🇹",
        "norway": "🇳🇴",
        "sweden": "🇸🇪",
        "switzerland": "🇨🇭",
        "czechia": "🇨🇿",
        "turkey": "🇹🇷",
        "türkiye": "🇹🇷",
        "bosnia and herzegovina": "🇧🇦",
        "brazil": "🇧🇷",
        "argentina": "🇦🇷",
        "colombia": "🇨🇴",
        "ecuador": "🇪🇨",
        "uruguay": "🇺🇾",
        "paraguay": "🇵🇾",
        "mexico": "🇲🇽",
        "usa": "🇺🇸",
        "united states": "🇺🇸",
        "canada": "🇨🇦",
        "panama": "🇵🇦",
        "haiti": "🇭🇹",
        "curacao": "🇨🇼",
        "curaçao": "🇨🇼",
        "japan": "🇯🇵",
        "south korea": "🇰🇷",
        "korea republic": "🇰🇷",
        "australia": "🇦🇺",
        "iran": "🇮🇷",
        "ir iran": "🇮🇷",
        "iraq": "🇮🇶",
        "saudi arabia": "🇸🇦",
        "jordan": "🇯🇴",
        "qatar": "🇶🇦",
        "uzbekistan": "🇺🇿",
        "morocco": "🇲🇦",
        "senegal": "🇸🇳",
        "ghana": "🇬🇭",
        "egypt": "🇪🇬",
        "algeria": "🇩🇿",
        "tunisia": "🇹🇳",
        "south africa": "🇿🇦",
        "côte d'ivoire": "🇨🇮",
        "ivory coast": "🇨🇮",
        "congo dr": "🇨🇩",
        "dr congo": "🇨🇩",
        "cabo verde": "🇨🇻",
        "cape verde": "🇨🇻",
        "new zealand": "🇳🇿"
    };

    function getFlag(name) {
        return FLAGS[name.toLowerCase()] || "🏳";
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function openModal(videoId) {
        document.getElementById('modal-iframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
        document.getElementById('modal-iframe').src = '';
    }

    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    async function loadMatches() {
        try {
            const res = await fetch('matches.json');
            const matches = await res.json();

            if (!matches.length) {
                document.getElementById('main').innerHTML = '<div class="empty-state">No highlights yet. Check back soon.</div>';
                return;
            }

            const byDate = {};
            matches.forEach(m => {
                if (!byDate[m.date]) byDate[m.date] = [];
                byDate[m.date].push(m);
            });

            const sorted = Object.keys(byDate).sort((a, b) => new Date(b) - new Date(a));

            let html = '';
            sorted.forEach(date => {
                html += `<div class="date-section">
                    <div class="date-label">${formatDate(date)}</div>
                    <div class="matches-grid">`;

                byDate[date].forEach(m => {
                    const channel = m.channel.toLowerCase().includes('itv') ? 'itv' : 'bbc';
                    html += `
                        <div class="match-card" onclick="openModal('${m.videoId}')">
                            <div class="flags">
                                <span>${getFlag(m.team1)}</span>
                                <span>${getFlag(m.team2)}</span>
                            </div>
                            <div class="match-info">
                                <div class="match-teams">${m.team1}<br>${m.team2}</div>
                                <span class="channel-badge channel-${channel}">${m.channel}</span>
                            </div>
                        </div>`;
                });

                html += `</div></div>`;
            });

            document.getElementById('main').innerHTML = html;

        } catch(e) {
            document.getElementById('main').innerHTML = '<div class="empty-state">Could not load matches.</div>';
        }
    }

    loadMatches();
</script>

</body>
</html>
